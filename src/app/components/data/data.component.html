<ion-header [translucent]="true">
  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-back-button
        defaultHref="/welcome"
        text="">
      </ion-back-button>
    </ion-buttons>

    <ion-title class="theme-title">
      Fuente de datos
    </ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list inset="true">

    <ion-item button detail (click)="openPDF()">
      <ion-icon name="document-outline" slot="start"></ion-icon>
       <ion-label>
        <h2>Preguntas</h2>
      </ion-label>
    </ion-item>

    <ion-item button detail (click)="openFile('assets/docs/respuestas.jpeg')">
      <ion-icon name="document-text-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Respuestas</h2>
      </ion-label>
    </ion-item>

  </ion-list>

</ion-content>
