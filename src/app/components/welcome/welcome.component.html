<div class="welcome-container">
  <div class="welcome-card">
    <h1>Test de Radioterapia</h1>
    <img src="assets/icon/radio.svg" alt="Radioterapia" class="logo" />

    <div class="form-group">
      <select id="questionCount" [(ngModel)]="selectedQuestionCount">
        <option [ngValue]="2">2 preguntas</option>
        <option [ngValue]="5">5 preguntas</option>
        <option [ngValue]="10">10 preguntas</option>
        <option [ngValue]="25">25 preguntas</option>
        <option [ngValue]="50">50 preguntas</option>
        <option [ngValue]="110">110 preguntas</option>
        <option [ngValue]="150">150 preguntas</option>
        <option [ngValue]="200">200 preguntas</option>
        <option [ngValue]="300">300 preguntas</option>
      </select>
    </div>

    <ion-card class="progress-card">
      <ion-card-header>
        <ion-card-title>📚 Progreso</ion-card-title>
        <ion-card-subtitle>
          {{ progress.answered }} de {{ progress.total }} preguntas
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <ion-progress-bar [value]="progress.answered / progress.total">
        </ion-progress-bar>

        <div class="progress-info">
          <div>
            <h2>{{ progress.percentage }}%</h2>
            <p>Completado</p>
          </div>

          <div>
            <h2>{{ progress.remaining }}</h2>
            <p>Restantes</p>
          </div>
        </div>

      </ion-card-content>
    </ion-card>
    <button class="btn-start" [disabled]="!selectedQuestionCount" (click)="startQuiz(TEST_TYPE.RADIO)">
      Radio
    </button>

    <button class="btn-common" [disabled]="!selectedQuestionCount" (click)="startQuiz(TEST_TYPE.COMMON)">
      Comunes
    </button>

    <button class="btn-mix" [disabled]="!selectedQuestionCount" (click)="startQuiz(TEST_TYPE.ALL)">
      Mixto 80/20 Radio-Comunes
    </button>

    <button class="btn-repaso" *ngIf="areFailedQuestions" (click)="startRepasoMode()">
      Repasar fallidas ({{ failedCount }})
    </button>

    <button *ngIf="['navis', 'ADMIN'].includes(username)" class="btn-suggestions" type="button"
      (click)="sendSuggestionsMail()">
      Envia sugerencias
    </button>

    <button class="btn-data" color="secondary" type="button" (click)="viewData()">
      Ver fuentes
    </button>

    <button class="btn-instructions" color="secondary" type="button" (click)="viewInstructions()">
      Instrucciones
    </button>
  </div>
</div>
