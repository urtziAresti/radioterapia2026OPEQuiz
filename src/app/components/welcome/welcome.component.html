<div class="welcome-container">
  <div class="welcome-card">
    <h1>🚀 Test de Radioterapia</h1>
    <p class="subtitle">Pon a prueba tus conocimientos antes del examen oficial</p>

    <div class="form-group">
      <label for="name">Introduce tu nombre:</label>
      <input
        type="text"
        id="name"
        [(ngModel)]="playerName"
        placeholder="Naroa"
        autocomplete="off"
      />
    </div>

    <div class="form-group">
      <label for="questionCount">Número de preguntas para el test:</label>
      <select id="questionCount" [(ngModel)]="selectedQuestionCount">
        <option [ngValue]="25">25 preguntas</option>
        <option [ngValue]="50">50 preguntas</option>
        <option [ngValue]="100">100 preguntas</option>
        <option [ngValue]="200">200 preguntas</option>
        <option [ngValue]="300">300 preguntas (Por defecto)</option>
      </select>
    </div>

    <button
      class="btn-start"
      [disabled]="!playerName.trim() || !selectedQuestionCount"
      (click)="startQuiz()"
    >
      Comenzar Cuestionario
    </button>
  </div>
</div>
