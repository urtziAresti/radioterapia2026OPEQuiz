<div class="result-box ion-text-center ion-padding">
  <ion-card class="score-card">
    <ion-card-content>
      <div class="ion-margin-top">
        <div *ngIf="resultsData.correctAnswers === resultsData.totalQuestions" class="perfect-score">
          <p>¡Perfecto! Sacaste un 10. 🎉</p>
          <img src="assets/gifs/congratulations.gif" alt="¡Felicidades!" class="celebration-gif" />
        </div>
        <!-- Mensaje si apruebas -->
        <p class="ion-text-center ion-text-bold"
          *ngIf="resultsData.correctAnswers / resultsData.totalQuestions >= 0.5 && resultsData.correctAnswers < resultsData.totalQuestions">
          Aprobaste Buen trabajo. 
        </p>
        <!-- Mensaje si suspendes -->
        <p *ngIf="resultsData.correctAnswers / resultsData.totalQuestions < 0.5">
          <b>Penko Sigue dando caña! </b>
        </p>
      </div>

      <h1>{{ resultsData.correctAnswers }} / {{ resultsData.totalQuestions }}</h1>
      <div class="ion-margin-top">
        <p><strong>{{texts.QUIZ.results.duration}}</strong></p>
        <ion-chip color="primary">
          <ion-icon name="time-outline"></ion-icon>
          <ion-label>{{ resultsData.elapsedTime }}</ion-label>
        </ion-chip>
      </div>
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" shape="round" color="primary" class="ion-margin-top" (click)="goToHome()">
    {{texts.QUIZ.results.backHome}}
  </ion-button>
</div>
